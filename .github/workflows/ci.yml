name: Build and test

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        runs-on: [ ubuntu-latest, macos-latest ]
        ocaml-compiler: [ 5 ]
    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Add Rocq-released Opam repository
        run: opam repo add rocq-released https://rocq-prover.github.io/opam/released/

      - name: Install Camltac directives
        run: opam install ./camltac-directives.opam

      - name: Install Camltac
        run: opam install ./camltac.opam

      - name: Build
        run: opam exec -- dune build

      - name: Run tests
        run: opam exec -- dune runtest
